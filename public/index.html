<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>GeoTagging HD</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.json" />
  <script src="/localdb.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f172a;
      --bg2:    #1e293b;
      --bg3:    #263348;
      --border: #334155;
      --blue:   #3b82f6;
      --blue-d: #2563eb;
      --green:  #22c55e;
      --green-d:#16a34a;
      --yellow: #f59e0b;
      --red:    #ef4444;
      --txt:    #f1f5f9;
      --txt2:   #94a3b8;
      --txt3:   #64748b;
      --nav-h:  60px;
      --top-h:  56px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── TOP BAR ── */
    #topBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--top-h);
      background: rgba(15,23,42,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
    }
    #topBar h1 { font-size: 17px; font-weight: 800; flex: 1; }
    #topBar h1 span { color: var(--blue); }
    .conn-badge {
      font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 20px;
    }
    .conn-online  { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .conn-offline { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }

    /* ── BOTTOM NAV ── */
    #bottomNav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      background: rgba(15,23,42,0.97);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr 1fr;
    }
    #bottomNav a {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; text-decoration: none; color: var(--txt3); font-size: 11px; font-weight: 600;
      transition: color .15s;
    }
    #bottomNav a .icon { font-size: 22px; line-height: 1; }
    #bottomNav a.active { color: var(--blue); }

    /* ── MAIN AREA ── */
    #main {
      padding-top: calc(var(--top-h) + 10px);
      padding-bottom: calc(var(--nav-h) + 16px);
      padding-left: 14px; padding-right: 14px;
      max-width: 520px; margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 18px;
      padding: 18px; margin-bottom: 12px;
    }
    .card-title {
      font-size: 12px; font-weight: 700; color: var(--txt3); text-transform: uppercase;
      letter-spacing: .7px; margin-bottom: 14px;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block; font-size: 12px; font-weight: 700; color: var(--txt2); margin-bottom: 6px;
    }
    .form-label .req { color: var(--blue); }
    .form-input, .form-textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; font-size: 14px; color: var(--txt);
      outline: none; transition: border-color .15s; font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--blue); }
    .form-textarea { resize: vertical; min-height: 72px; }

    /* ── CAMERA AREA ── */
    #cameraPlaceholder {
      width: 100%; aspect-ratio: 4/3; background: var(--bg3);
      border: 2px dashed var(--border); border-radius: 16px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; cursor: pointer;
      transition: border-color .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #cameraPlaceholder:active { background: var(--bg2); border-color: var(--blue); }
    #cameraPlaceholder .cam-icon { font-size: 52px; }
    #cameraPlaceholder .cam-label { font-size: 15px; font-weight: 700; color: var(--txt2); }
    #cameraPlaceholder .cam-sub   { font-size: 12px; color: var(--txt3); }

    #previewImg {
      width: 100%; border-radius: 14px; display: none;
      border: 1px solid var(--border); background: #000;
    }
    #canvas { display: none; }

    /* ── OCR RESULT ── */
    #ocrResult {
      display: none; background: #020d1f; border: 1px solid #1e3a5f;
      border-radius: 12px; padding: 12px 14px; font-family: monospace;
      font-size: 12px; color: #86efac; white-space: pre-wrap; margin-top: 12px;
      line-height: 1.6;
    }

    /* ── BUTTONS ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-weight: 700; border-radius: 14px; cursor: pointer; border: none;
      font-size: 14px; padding: 14px; transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent; font-family: inherit;
    }
    .btn:active { transform: scale(.97); opacity: .85; }
    .btn-primary  { background: var(--blue);    color: #fff; }
    .btn-success  { background: var(--green-d); color: #fff; }
    .btn-warn     { background: #78350f;        color: #fcd34d; border: 1px solid #92400e; }
    .btn-neutral  { background: var(--bg3);     color: var(--txt2); border: 1px solid var(--border); }
    .btn-danger   { background: #450a0a;        color: #fca5a5; border: 1px solid #7f1d1d; }
    .btn-full { width: 100%; }
    .btn-lg   { padding: 16px; font-size: 16px; }
    .btn-sm   { padding: 11px; font-size: 13px; }

    .btn-row { display: grid; gap: 8px; margin-top: 10px; }
    .btn-row-3 { grid-template-columns: 1fr 1fr 1fr; }
    .btn-row-2 { grid-template-columns: 1fr 1fr; }

    /* ── SAVE STATUS ── */
    #saveStatus {
      padding: 12px 14px; border-radius: 12px; font-weight: 700; font-size: 14px;
      text-align: center; margin-bottom: 10px;
    }

    /* ── GPS ── */
    #gpsCard { margin-top: 12px; }
    .gps-row { display: flex; gap: 8px; }
    .gps-badge {
      flex: 1; padding: 10px 12px; border-radius: 12px; font-size: 11px;
      font-weight: 600; cursor: pointer; transition: opacity .15s; text-align: center;
    }
    .gps-searching { background: #0c1a2e; color: #60a5fa; border: 1px solid #1e3a5f; }
    .gps-ok        { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .gps-err       { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .gps-manual    { background: #1c1a00; color: #fcd34d; border: 1px solid #92400e; }

    #gpsErrorPanel {
      display: none; margin-top: 10px; background: #1c0a0a;
      border: 1px solid #7f1d1d; border-radius: 12px; padding: 14px;
    }
    #gpsErrorMsg { color: #f87171; font-size: 12px; margin-bottom: 10px; line-height: 1.5; }
    .manual-label { font-size: 11px; color: var(--txt3); margin-bottom: 8px; }
    .manual-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .manual-input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 9px 10px; color: var(--txt); font-size: 12px; outline: none; width: 100%;
    }
    .manual-input:focus { border-color: var(--blue); }
    .manual-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* ── PENDING BADGE ── */
    #pendingBadge {
      display: none; background: #451a03; border: 1px solid #92400e;
      border-radius: 12px; padding: 10px 14px; font-size: 12px; color: #fcd34d;
      margin-top: 10px; text-align: center;
    }

    /* ── STATUS MSG ── */
    #statusMsg { margin-top: 10px; text-align: center; font-size: 13px; min-height: 18px; line-height: 1.5; }

    /* ── SPINNER ── */
    .spinner {
      border: 3px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; width: 20px; height: 20px;
      animation: spin 0.8s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FILE INPUTS (hidden) ── */
    #fileCamera, #fileImport { display: none; }
  </style>
</head>
<body>

<!-- Hidden inputs & canvas -->
<input type="file" id="fileCamera" accept="image/*" capture="environment" />
<input type="file" id="fileImport" accept="image/*" />
<canvas id="canvas"></canvas>

<!-- ── TOP BAR ── -->
<div id="topBar">
  <h1>Geo<span>Tag</span> HD</h1>
  <div id="connBadge" class="conn-badge conn-online">✅ Online</div>
</div>

<!-- ── MAIN ── -->
<div id="main">

  <!-- Form card -->
  <div class="card">
    <div class="card-title">📋 Informasi Equipment</div>

    <div class="form-group">
      <label class="form-label">Tag Item <span class="req">*</span></label>
      <input id="itemTag" class="form-input" type="text" placeholder="Contoh: LV-1032" autocapitalize="characters" />
    </div>

    <div class="form-group">
      <label class="form-label">Lokasi</label>
      <input id="location" class="form-input" type="text" placeholder="Contoh: Area amonia bawah reformer" />
    </div>

    <div class="form-group">
      <label class="form-label">Catatan</label>
      <textarea id="note" class="form-textarea" placeholder="Kondisi, temuan, atau keterangan tambahan"></textarea>
    </div>
  </div>

  <!-- Camera card -->
  <div class="card">
    <div class="card-title">📷 Foto</div>

    <!-- Placeholder -->
    <div id="cameraPlaceholder" onclick="document.getElementById('fileCamera').click()">
      <div class="cam-icon">📷</div>
      <div class="cam-label">Ketuk untuk Ambil Foto</div>
      <div class="cam-sub">Membuka kamera HP langsung</div>
    </div>

    <!-- Preview -->
    <img id="previewImg" alt="Preview" />

    <!-- OCR result -->
    <div id="ocrResult"></div>

    <!-- Status msg -->
    <div id="statusMsg"></div>

    <!-- Buttons: initial state -->
    <div id="btnGroup" class="btn-row btn-row-2" style="margin-top:14px">
      <button class="btn btn-primary" onclick="document.getElementById('fileCamera').click()">
        📷 Ambil Foto
      </button>
      <button class="btn btn-neutral" onclick="document.getElementById('fileImport').click()">
        📁 Import
      </button>
    </div>

    <!-- Buttons: after capture -->
    <div id="btnAfterCapture" style="display:none;margin-top:12px">
      <button id="btnSave" class="btn btn-success btn-full btn-lg" onclick="savePhoto()">
        💾 Simpan ke Server
      </button>
      <div class="btn-row btn-row-3" style="margin-top:8px">
        <button class="btn btn-primary btn-sm" onclick="downloadPhoto()">⬇️ Download</button>
        <button class="btn btn-warn    btn-sm" onclick="editTag()">✏️ Edit Tag</button>
        <button class="btn btn-neutral btn-sm" onclick="resetCapture()">🔄 Ulangi</button>
      </div>
    </div>

    <!-- Buttons: after save -->
    <div id="btnAfterSave" style="display:none;margin-top:12px">
      <div id="saveStatus"></div>
      <button class="btn btn-success btn-full btn-lg" onclick="nextPhoto()">
        📷 Foto Berikutnya (tag sama)
      </button>
      <div class="btn-row btn-row-2" style="margin-top:8px">
        <button class="btn btn-primary btn-sm" onclick="downloadPhoto()">⬇️ Download</button>
        <button class="btn btn-warn    btn-sm" onclick="editTag()">✏️ Edit Tag</button>
      </div>
    </div>
  </div>

  <!-- GPS card -->
  <div class="card" id="gpsCard">
    <div class="card-title">🛰️ GPS & Koneksi</div>
    <div class="gps-row">
      <div id="gpsBadge" class="gps-badge gps-searching" onclick="retryGPS()">
        📡 Mencari GPS...
      </div>
    </div>

    <!-- GPS error panel -->
    <div id="gpsErrorPanel">
      <div id="gpsErrorMsg"></div>
      <div class="manual-label">📍 Input koordinat manual:</div>
      <div class="manual-inputs">
        <input id="manualLat" class="manual-input" type="number" step="any" placeholder="Latitude (-1.2416)" />
        <input id="manualLon" class="manual-input" type="number" step="any" placeholder="Longitude (122.61)" />
      </div>
      <input id="manualAlt" class="manual-input" type="number" step="any" placeholder="Altitude meter (opsional)" style="margin-bottom:8px" />
      <div class="manual-btns">
        <button class="btn btn-primary btn-sm" onclick="applyManualGPS()">✅ Pakai Koordinat</button>
        <button class="btn btn-neutral btn-sm" onclick="retryGPS()">🔄 Coba GPS Lagi</button>
      </div>
    </div>

    <!-- Pending offline -->
    <div id="pendingBadge">
      📥 <span id="pendingCount">0</span> foto offline menunggu upload ke server
    </div>
  </div>

</div><!-- /main -->

<!-- ── BOTTOM NAV ── -->
<nav id="bottomNav">
  <a href="/" class="active">
    <span class="icon">📷</span>
    Kamera
  </a>
  <a href="/gallery">
    <span class="icon">🖼️</span>
    Galeri
  </a>
</nav>

<script>
// ─────────────────────────────────
// State
// ─────────────────────────────────
let coords = { latitude: null, longitude: null, altitude: null };
let currentImgUrl   = null;
let currentImgBlob  = null;
let currentImgData  = null;
let isOnline        = navigator.onLine;
let isSyncing       = false;
let watchId         = null;
let importedPhotoId = null;
let gpsManual       = false;

// ─────────────────────────────────
// PWA Service Worker
// ─────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ─────────────────────────────────
// GPS
// ─────────────────────────────────
function setGPSSuccess(pos) {
  coords.latitude  = pos.coords.latitude.toFixed(6);
  coords.longitude = pos.coords.longitude.toFixed(6);
  coords.altitude  = pos.coords.altitude !== null ? pos.coords.altitude.toFixed(1) + 'm' : 'N/A';
  const acc = pos.coords.accuracy ? ` ±${Math.round(pos.coords.accuracy)}m` : '';
  const badge = document.getElementById('gpsBadge');
  badge.className = 'gps-badge gps-ok';
  badge.textContent = `🛰️ ${coords.latitude}, ${coords.longitude}${acc}`;
  document.getElementById('gpsErrorPanel').style.display = 'none';
  gpsManual = false;
}

function setGPSError(err) {
  if (gpsManual) return;
  const msgs = {
    1: '🔒 Izin GPS ditolak — aktifkan izin lokasi di pengaturan browser/HP lalu ketuk Coba GPS Lagi',
    2: '📡 Sinyal GPS lemah — coba pindah ke area terbuka atau pakai koordinat manual',
    3: '⏱️ GPS timeout — sinyal lama didapat, coba lagi atau input manual',
  };
  document.getElementById('gpsBadge').className = 'gps-badge gps-err';
  document.getElementById('gpsBadge').textContent = '⚠️ GPS gagal — ketuk untuk coba lagi';
  document.getElementById('gpsErrorPanel').style.display = 'block';
  document.getElementById('gpsErrorMsg').textContent = msgs[err?.code] || '⚠️ GPS tidak tersedia';
}

function startGPS() {
  if (!('geolocation' in navigator)) {
    document.getElementById('gpsBadge').className = 'gps-badge gps-err';
    document.getElementById('gpsBadge').textContent = '⚠️ GPS tidak didukung';
    document.getElementById('gpsErrorPanel').style.display = 'block';
    document.getElementById('gpsErrorMsg').textContent = '⚠️ Browser ini tidak mendukung GPS — gunakan koordinat manual';
    return;
  }
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    document.getElementById('gpsBadge').className = 'gps-badge gps-err';
    document.getElementById('gpsBadge').textContent = '⚠️ GPS butuh HTTPS';
    document.getElementById('gpsErrorPanel').style.display = 'block';
    document.getElementById('gpsErrorMsg').textContent = '🔐 GPS membutuhkan HTTPS. Akses via HTTP diblokir browser. Gunakan koordinat manual, atau akses via HTTPS.';
    return;
  }
  document.getElementById('gpsBadge').className = 'gps-badge gps-searching';
  document.getElementById('gpsBadge').textContent = '📡 Mencari GPS...';
  navigator.geolocation.getCurrentPosition(setGPSSuccess, setGPSError, { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 });
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(setGPSSuccess, setGPSError, { enableHighAccuracy: true, timeout: 15000, maximumAge: 3000 });
}

function retryGPS() {
  gpsManual = false;
  coords = { latitude: null, longitude: null, altitude: null };
  startGPS();
}

function applyManualGPS() {
  const lat = parseFloat(document.getElementById('manualLat').value);
  const lon = parseFloat(document.getElementById('manualLon').value);
  const alt = parseFloat(document.getElementById('manualAlt').value);
  if (isNaN(lat) || isNaN(lon)) { alert('Latitude dan Longitude harus diisi dengan angka.\nContoh: -1.241682, 122.610602'); return; }
  if (lat < -90 || lat > 90 || lon < -180 || lon > 180) { alert('Koordinat tidak valid.\nLatitude: -90 s/d 90 | Longitude: -180 s/d 180'); return; }
  coords.latitude  = lat.toFixed(6);
  coords.longitude = lon.toFixed(6);
  coords.altitude  = isNaN(alt) ? 'N/A' : alt.toFixed(1) + 'm';
  gpsManual = true;
  document.getElementById('gpsBadge').className = 'gps-badge gps-manual';
  document.getElementById('gpsBadge').textContent = `📍 Manual: ${coords.latitude}, ${coords.longitude}`;
  document.getElementById('gpsErrorPanel').style.display = 'none';
}

startGPS();

// ─────────────────────────────────
// Connection
// ─────────────────────────────────
function updateConnection() {
  isOnline = navigator.onLine;
  const b  = document.getElementById('connBadge');
  if (isOnline) {
    b.className = 'conn-badge conn-online';
    b.textContent = '✅ Online';
    syncPending();
  } else {
    b.className = 'conn-badge conn-offline';
    b.textContent = '⚠️ Offline';
  }
}
window.addEventListener('online',  updateConnection);
window.addEventListener('offline', updateConnection);
updateConnection();

// ─────────────────────────────────
// Watermark
// ─────────────────────────────────
function drawWatermark(ctx, width, height, data) {
  const fontSize   = Math.max(Math.floor(width * 0.009), 11);
  const lineHeight = Math.floor(fontSize * 1.65);
  const padX       = Math.floor(fontSize * 1.2);
  const padY       = Math.floor(fontSize * 0.9);
  const now  = new Date();
  const date = now.toLocaleDateString('id-ID', {day:'2-digit',month:'2-digit',year:'numeric'});
  const time = now.toLocaleTimeString('id-ID', {hour12:false}).replace(/:/g,'.');
  const lines = [
    { label: 'item_tag   ', value: data.itemTag },
    { label: 'location   ', value: data.location },
    { label: 'note       ', value: data.note },
    { label: 'coordinates', value: `${data.latitude}, ${data.longitude}` },
    { label: 'altitude   ', value: data.altitude },
    { label: 'date       ', value: date },
    { label: 'time       ', value: time },
  ];
  const boxH = lines.length * lineHeight + padY * 2;
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, height - boxH, width, boxH);
  ctx.textBaseline = 'top';
  ctx.font = `bold ${fontSize}px monospace`;
  lines.forEach((line, i) => {
    const y = height - boxH + padY + i * lineHeight;
    ctx.fillStyle = '#aab4c4';
    ctx.fillText(`${line.label} : `, padX, y);
    const lw = ctx.measureText(`${line.label} : `).width;
    ctx.fillStyle = '#ffffff';
    ctx.fillText(line.value, padX + lw, y);
  });
}

// ─────────────────────────────────
// Process foto
// ─────────────────────────────────
function processPhoto(file, isImport = false) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.getElementById('canvas');
      canvas.width  = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const data = {
        itemTag:   document.getElementById('itemTag').value.toUpperCase() || 'UNKNOWN',
        location:  document.getElementById('location').value || 'Tidak diisi',
        note:      document.getElementById('note').value || '-',
        latitude:  coords.latitude  || 'N/A',
        longitude: coords.longitude || 'N/A',
        altitude:  coords.altitude  || 'N/A',
      };
      if (!isImport) drawWatermark(ctx, img.width, img.height, data);
      currentImgData = data;
      currentImgUrl  = canvas.toDataURL('image/jpeg', 0.95);
      canvas.toBlob(blob => { currentImgBlob = blob; }, 'image/jpeg', 0.95);
      const prev = document.getElementById('previewImg');
      prev.src = currentImgUrl;
      prev.style.display = 'block';
      document.getElementById('cameraPlaceholder').style.display = 'none';
      document.getElementById('btnGroup').style.display           = 'none';
      document.getElementById('btnAfterCapture').style.display    = 'block';
      document.getElementById('btnAfterSave').style.display       = 'none';
      document.getElementById('statusMsg').textContent            = '';
      document.getElementById('ocrResult').style.display          = 'none';
      if (isImport) {
        document.getElementById('statusMsg').style.color = '#60a5fa';
        document.getElementById('statusMsg').textContent = '🔍 Membaca watermark dari foto...';
        uploadForOCR(file);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('fileCamera').addEventListener('change', function() {
  if (this.files[0]) processPhoto(this.files[0], false);
  this.value = '';
});
document.getElementById('fileImport').addEventListener('change', function() {
  if (this.files[0]) processPhoto(this.files[0], true);
  this.value = '';
});

// ─────────────────────────────────
// Upload untuk OCR (import)
// ─────────────────────────────────
async function uploadForOCR(file) {
  try {
    const fd = new FormData();
    fd.append('photo', file, file.name || 'import.jpg');
    fd.append('itemTag',       document.getElementById('itemTag').value.toUpperCase() || 'IMPORT');
    fd.append('location',      document.getElementById('location').value || '-');
    fd.append('note',          document.getElementById('note').value || '-');
    fd.append('latitude',      coords.latitude  || 'N/A');
    fd.append('longitude',     coords.longitude || 'N/A');
    fd.append('altitude',      coords.altitude  || 'N/A');
    fd.append('datetimeTaken', new Date().toLocaleString('id-ID'));
    const res  = await fetch('/api/upload', { method:'POST', body:fd });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    if (data.success) {
      importedPhotoId = data.id;
      document.getElementById('statusMsg').textContent = '🔍 OCR watermark sedang diproses di server...';
      document.getElementById('statusMsg').style.color = '#60a5fa';
      pollOCR(data.id);
    } else throw new Error(data.error || 'Upload gagal');
  } catch (err) {
    document.getElementById('statusMsg').textContent = '⚠️ Gagal upload: ' + err.message;
    document.getElementById('statusMsg').style.color = '#f59e0b';
    importedPhotoId = null;
  }
}

async function pollOCR(photoId) {
  let tries = 0;
  const iv = setInterval(async () => {
    tries++;
    try {
      const r = await fetch(`/api/photos/${photoId}/ocr`);
      if (!r.ok) { clearInterval(iv); return; }
      const d = await r.json();
      if (d.ocr_status === 'done') {
        clearInterval(iv);
        if (d.ocr_text && d.ocr_text.trim()) {
          document.getElementById('ocrResult').style.display = 'block';
          document.getElementById('ocrResult').textContent   = '📄 Data dari watermark:\n' + d.ocr_text;
          document.getElementById('statusMsg').textContent   = '✅ Watermark berhasil dibaca! Periksa & lengkapi form lalu tekan Simpan.';
          document.getElementById('statusMsg').style.color   = '#4ade80';
          autoFillFromOCR(d.ocr_text);
        } else {
          document.getElementById('statusMsg').textContent = '⚠️ Watermark tidak terdeteksi — isi form manual lalu tekan Simpan.';
          document.getElementById('statusMsg').style.color = '#f59e0b';
        }
      } else if (d.ocr_status === 'error' || tries > 20) {
        clearInterval(iv);
        document.getElementById('statusMsg').textContent = '⚠️ OCR gagal — isi form manual lalu tekan Simpan.';
        document.getElementById('statusMsg').style.color = '#f59e0b';
      }
    } catch (_) { clearInterval(iv); }
  }, 3000);
}

function autoFillFromOCR(text) {
  const tagMatch  = text.match(/item_tag\s*:\s*(.+)/i);
  const locMatch  = text.match(/location\s*:\s*(.+)/i);
  const noteMatch = text.match(/note\s*:\s*(.+)/i);
  const tagEl = document.getElementById('itemTag');
  const locEl = document.getElementById('location');
  const noteEl= document.getElementById('note');
  if (tagMatch  && !tagEl.value)  tagEl.value  = tagMatch[1].trim();
  if (locMatch  && !locEl.value)  locEl.value  = locMatch[1].trim();
  if (noteMatch && !noteEl.value) noteEl.value = noteMatch[1].trim();
}

// ─────────────────────────────────
// Save
// ─────────────────────────────────
async function savePhoto() {
  if (!currentImgUrl) return;
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Menyimpan...';

  const formTag  = document.getElementById('itemTag').value.toUpperCase()  || 'UNKNOWN';
  const formLoc  = document.getElementById('location').value               || 'Tidak diisi';
  const formNote = document.getElementById('note').value                   || '-';
  const formLat  = coords.latitude  || currentImgData?.latitude  || 'N/A';
  const formLon  = coords.longitude || currentImgData?.longitude || 'N/A';
  const formAlt  = coords.altitude  || currentImgData?.altitude  || 'N/A';
  const formDt   = new Date().toLocaleString('id-ID');

  const photoData = { imageBase64: currentImgUrl.split(',')[1], itemTag: formTag, location: formLoc, note: formNote, latitude: formLat, longitude: formLon, altitude: formAlt, datetimeTaken: formDt };

  if (isOnline) {
    try {
      if (importedPhotoId) {
        const res  = await fetch(`/api/photos/${importedPhotoId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({itemTag:formTag,location:formLoc,note:formNote,latitude:formLat,longitude:formLon,altitude:formAlt,datetimeTaken:formDt}) });
        const data = await res.json();
        if (data.success) showSaveStatus('✅ Data tersimpan ke server!', '#4ade80', '#052e16');
        else throw new Error(data.error);
      } else {
        const fd = new FormData();
        const blob = currentImgBlob || dataURLtoBlob(currentImgUrl);
        fd.append('photo', blob, 'photo.jpg');
        fd.append('itemTag', formTag); fd.append('location', formLoc); fd.append('note', formNote);
        fd.append('latitude', formLat); fd.append('longitude', formLon); fd.append('altitude', formAlt);
        fd.append('datetimeTaken', formDt);
        const res  = await fetch('/api/upload', { method:'POST', body:fd });
        const data = await res.json();
        if (data.success) showSaveStatus('✅ Berhasil disimpan ke server!', '#4ade80', '#052e16');
        else throw new Error(data.error);
      }
    } catch (err) {
      await saveLocally(photoData);
      showSaveStatus('⚠️ Gagal simpan ke server — tersimpan lokal & Download', '#fcd34d', '#451a03');
      downloadPhoto();
    }
  } else {
    await saveLocally(photoData);
    downloadPhoto();
    showSaveStatus('📥 Offline — tersimpan di Download & antrian sync', '#fcd34d', '#451a03');
  }

  btn.disabled = false;
  btn.innerHTML = '💾 Simpan ke Server';
  document.getElementById('btnAfterCapture').style.display = 'none';
  document.getElementById('btnAfterSave').style.display    = 'block';
}

function showSaveStatus(msg, color, bg) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.style.cssText = `color:${color};background:${bg};border:1px solid ${color}44;padding:12px 14px;border-radius:12px;font-weight:700;font-size:14px;text-align:center;margin-bottom:10px`;
}

// ─────────────────────────────────
// Download
// ─────────────────────────────────
function downloadPhoto() {
  if (!currentImgUrl) return;
  const a = document.createElement('a');
  a.href = currentImgUrl;
  a.download = `GEO_${currentImgData?.itemTag||'foto'}_${Date.now()}.jpg`;
  a.click();
}

// ─────────────────────────────────
// UI helpers
// ─────────────────────────────────
function resetCapture() {
  currentImgUrl = currentImgBlob = currentImgData = null;
  importedPhotoId = null;
  document.getElementById('previewImg').style.display        = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'flex';
  document.getElementById('btnGroup').style.display          = 'flex';
  document.getElementById('btnAfterCapture').style.display   = 'none';
  document.getElementById('btnAfterSave').style.display      = 'none';
  document.getElementById('ocrResult').style.display         = 'none';
  document.getElementById('statusMsg').textContent           = '';
}

function editTag() {
  document.getElementById('btnAfterCapture').style.display   = 'none';
  document.getElementById('btnAfterSave').style.display      = 'none';
  document.getElementById('btnGroup').style.display          = 'flex';
  document.getElementById('previewImg').style.display        = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'flex';
  document.getElementById('itemTag').focus();
  currentImgUrl = null; importedPhotoId = null;
}

function nextPhoto() {
  currentImgUrl = currentImgBlob = currentImgData = null;
  importedPhotoId = null;
  document.getElementById('previewImg').style.display        = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'flex';
  document.getElementById('btnGroup').style.display          = 'flex';
  document.getElementById('btnAfterCapture').style.display   = 'none';
  document.getElementById('btnAfterSave').style.display      = 'none';
  document.getElementById('ocrResult').style.display         = 'none';
  document.getElementById('statusMsg').textContent           = '';
  document.getElementById('fileCamera').click();
}

// ─────────────────────────────────
// Offline
// ─────────────────────────────────
async function saveLocally(photoData) {
  try { await localDB.savePendingPhoto(photoData); updatePendingBadge(); } catch (_) {}
}

async function updatePendingBadge() {
  try {
    const count = await localDB.getPendingCount();
    const badge = document.getElementById('pendingBadge');
    badge.style.display = count > 0 ? 'block' : 'none';
    if (count > 0) document.getElementById('pendingCount').textContent = count;
  } catch (_) {}
}

async function syncPending() {
  if (!isOnline || isSyncing) return;
  isSyncing = true;
  try {
    const pending = await localDB.getPendingPhotos();
    for (const p of pending) {
      try {
        const blob = dataURLtoBlob('data:image/jpeg;base64,' + p.imageBase64);
        const fd   = new FormData();
        fd.append('photo', blob, 'photo.jpg');
        ['itemTag','location','note','latitude','longitude','altitude','datetimeTaken'].forEach(k => fd.append(k, p[k]||''));
        const res = await fetch('/api/upload', { method:'POST', body:fd });
        const d   = await res.json();
        if (d.success) await localDB.markAsSynced(p.id);
      } catch (_) {}
    }
    updatePendingBadge();
  } finally { isSyncing = false; }
}

// ─────────────────────────────────
// Utils
// ─────────────────────────────────
function dataURLtoBlob(dataUrl) {
  const [header, data] = dataUrl.split(',');
  const mime = header.match(/:(.*?);/)[1];
  const bin  = atob(data);
  const arr  = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// ─────────────────────────────────
// Init
// ─────────────────────────────────
async function init() {
  try { await localDB.init(); } catch (_) {}
  updatePendingBadge();
  setInterval(updatePendingBadge, 10000);
}
init();
</script>
