<!DOCTYPE html>
<html>
<head>
  <title>Generate PWA Icons</title>
</head>
<body>
  <h1>Generate Icons untuk PWA</h1>
  <p>Buka file ini di browser dan icon akan di-generate otomatis</p>
  <canvas id="canvas192" width="192" height="192"></canvas>
  <canvas id="canvas512" width="512" height="512"></canvas>
  
  <script>
    function generateIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#2563eb';
      ctx.fillRect(0, 0, size, size);
      
      // Rounded corners effect
      ctx.fillStyle = '#2563eb';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.125);
      ctx.fill();
      
      // Camera emoji
      ctx.font = `${size * 0.4}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('📸', size / 2, size * 0.35);
      
      // Text
      ctx.font = `bold ${size * 0.125}px Arial`;
      ctx.fillStyle = 'white';
      ctx.fillText('GeoTag', size / 2, size * 0.65);
      
      // Download
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `icon-${size}.png`;
        a.click();
      });
    }
    
    // Auto generate on load
    setTimeout(() => {
      generateIcon('canvas192', 192);
      generateIcon('canvas512', 512);
    }, 500);
  </script>
</body>
</html>
